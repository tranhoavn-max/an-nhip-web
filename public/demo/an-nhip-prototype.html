<div style=\"flex:1;position:relative;overflow:hidden;\">\n       <div class=\"screenIn\" key=\"{{ screen }}\" style=\"position:absolute;inset:0;\">\n\n        <!-- ============ WELCOME ============ -->\n        <sc-if value=\"{{ isWelcome }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:space-between;padding:30px 30px 26px;\">\n          <div style=\"flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:30px;\">\n            <svg width=\"208\" height=\"208\" viewBox=\"0 0 200 200\" fill=\"none\">\n              <g style=\"animation:breathe 8s ease-in-out infinite;transform-origin:100px 100px;\">\n                <circle cx=\"100\" cy=\"100\" r=\"82\" fill=\"#CDE7DE\" opacity=\".5\"><\u002Fcircle>\n              <\u002Fg>\n              <circle cx=\"100\" cy=\"100\" r=\"58\" fill=\"#A9D6C7\" opacity=\".45\"><\u002Fcircle>\n              <circle cx=\"100\" cy=\"100\" r=\"36\" fill=\"#5B9B8B\" opacity=\".2\"><\u002Fcircle>\n              <path d=\"M36 116 Q68 92 100 116 T164 116\" stroke=\"#5B9B8B\" stroke-width=\"3.6\" stroke-linecap=\"round\" fill=\"none\" opacity=\".75\"><\u002Fpath>\n              <path d=\"M46 134 Q72 114 100 134 T154 134\" stroke=\"#5B9B8B\" stroke-width=\"3\" stroke-linecap=\"round\" fill=\"none\" opacity=\".4\"><\u002Fpath>\n              <path d=\"M58 150 Q78 136 100 150 T142 150\" stroke=\"#5B9B8B\" stroke-width=\"2.4\" stroke-linecap=\"round\" fill=\"none\" opacity=\".25\"><\u002Fpath>\n            <\u002Fsvg>\n            <div>\n              <div style=\"display:inline-flex;align-items:center;gap:7px;margin-bottom:14px;padding:6px 14px;border-radius:20px;background:#EAF3EF;border:1px solid #D6E8E0;\">\n                <span style=\"width:9px;height:9px;border-radius:50%;background:#5B9B8B;\"><\u002Fspan>\n                <span style=\"font-size:13px;font-weight:800;letter-spacing:.2px;color:#3f7d6e;\">m-Mental-Health<\u002Fspan>\n              <\u002Fdiv>\n              <h1 style=\"margin:0 0 16px;font-size:29px;font-weight:800;letter-spacing:-.4px;line-height:1.25;\">Một không gian<br>để bình tâm<\u002Fh1>\n              <p style=\"margin:0;font-size:15px;line-height:1.62;color:#6B7975;font-weight:500;text-wrap:pretty;max-width:312px;\">m-Mental-Health là ứng dụng hỗ trợ tự quản lý lo âu dựa trên CBT — thực hành Guided Breathing, Grounding 5-4-3-2-1, Thought Record và ghi nhận thay đổi trước/sau can thiệp. <span style=\"color:#8a9692;\">Ứng dụng không cung cấp chẩn đoán hoặc điều trị y khoa.<\u002Fspan><\u002Fp>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"width:100%;display:flex;flex-direction:column;align-items:center;gap:22px;\">\n            <div style=\"display:flex;gap:8px;\">\n              <div style=\"width:24px;height:7px;border-radius:4px;background:#5B9B8B;\"><\u002Fdiv>\n              <div style=\"width:7px;height:7px;border-radius:4px;background:#CDE7DE;\"><\u002Fdiv>\n              <div style=\"width:7px;height:7px;border-radius:4px;background:#CDE7DE;\"><\u002Fdiv>\n              <div style=\"width:7px;height:7px;border-radius:4px;background:#CDE7DE;\"><\u002Fdiv>\n            <\u002Fdiv>\n            <button onclick=\"{{ onStart }}\" style=\"width:100%;border:none;border-radius:18px;background:#5B9B8B;color:#fff;padding:18px;font-size:17px;font-weight:800;font-family:inherit;cursor:pointer;box-shadow:0 12px 26px rgba(91,155,139,.3);\">Bắt đầu<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- ============ DISCLAIMER ============ -->\n        <sc-if value=\"{{ isDisclaimer }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"position:absolute;inset:0;display:flex;flex-direction:column;padding:14px 0 22px;\">\n          <div style=\"padding:6px 30px 14px;flex-shrink:0;\">\n            <div style=\"display:flex;gap:8px;margin-bottom:18px;\">\n              <div style=\"width:7px;height:7px;border-radius:4px;background:#CDE7DE;\"><\u002Fdiv>\n              <div style=\"width:24px;height:7px;border-radius:4px;background:#5B9B8B;\"><\u002Fdiv>\n              <div style=\"width:7px;height:7px;border-radius:4px;background:#CDE7DE;\"><\u002Fdiv>\n              <div style=\"width:7px;height:7px;border-radius:4px;background:#CDE7DE;\"><\u002Fdiv>\n            <\u002Fdiv>\n            <h2 style=\"margin:0;font-size:23px;font-weight:800;letter-spacing:-.3px;\">Trước khi bắt đầu<\u002Fh2>\n          <\u002Fdiv>\n          <div class=\"scrollbody\" onscroll=\"{{ onDisclaimerScroll }}\" style=\"flex:1;overflow-y:auto;padding:4px 30px 12px;\">\n            <p style=\"margin:0 0 20px;font-size:15.5px;line-height:1.7;color:#3a4744;font-weight:500;text-wrap:pretty;\">Ứng dụng này được phát triển phục vụ mục đích học thuật trong phạm vi luận văn. Ứng dụng <b style=\"font-weight:800;\">không cung cấp chẩn đoán y khoa<\u002Fb>, không thay thế tư vấn của bác sĩ, chuyên gia tâm lý hoặc dịch vụ cấp cứu.<\u002Fp>\n            <div style=\"background:#F7EFDD;border:1px solid #EAD9B4;border-radius:18px;padding:18px 18px 18px 17px;display:flex;gap:13px;\">\n              <svg width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\" style=\"flex-shrink:0;margin-top:1px;\"><path d=\"M12 3.5 21.5 20H2.5L12 3.5Z\" stroke=\"#C9A45B\" stroke-width=\"1.7\" stroke-linejoin=\"round\"><\u002Fpath><path d=\"M12 10v4.5\" stroke=\"#C9A45B\" stroke-width=\"1.9\" stroke-linecap=\"round\"><\u002Fpath><circle cx=\"12\" cy=\"17.4\" r=\"1.1\" fill=\"#C9A45B\"><\u002Fcircle><\u002Fsvg>\n              <p style=\"margin:0;font-size:15px;line-height:1.65;color:#7d6630;font-weight:600;text-wrap:pretty;\">Nếu bạn đang có ý nghĩ tự làm hại bản thân, gặp khủng hoảng nghiêm trọng, đau ngực, khó thở hoặc triệu chứng nguy hiểm, hãy liên hệ ngay với người thân, cơ sở y tế hoặc dịch vụ khẩn cấp tại địa phương.<\u002Fp>\n            <\u002Fdiv>\n margin:0;font-size:15px;color:#6B7975;font-weight:500;\">Cách ứng dụng bảo vệ thông tin của bạn.<\u002Fp>\n          <\u002Fdiv>\n          <div style=\"flex:1;display:flex;flex-direction:column;justify-content:center;gap:14px;\">\n            <div style=\"display:flex;gap:15px;align-items:flex-start;background:#F2F7F5;border-radius:20px;padding:18px;\">\n              <div style=\"width:46px;height:46px;border-radius:14px;background:#CDE7DE;display:flex;align-items:center;justify-content:center;flex-shrink:0;\">\n                <svg width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\"><rect x=\"6\" y=\"3\" width=\"12\" height=\"18\" rx=\"3\" stroke=\"#3f7d6e\" stroke-width=\"1.7\"><\u002Frect><circle cx=\"12\" cy=\"17.5\" r=\"1.2\" fill=\"#3f7d6e\"><\u002Fcircle><\u002Fsvg>\n              <\u002Fdiv>\n              <div><h3 style=\"margin:0 0 4px;font-size:16px;font-weight:800;\">Dữ liệu ở lại trên thiết bị<\u002Fh3><p style=\"margin:0;font-size:14px;line-height:1.55;color:#6B7975;font-weight:500;\">App lưu cục bộ (local-first), không gửi lên máy chủ.<\u002Fp><\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"display:flex;gap:15px;align-items:flex-start;background:#F2F7F5;border-radius:20px;padding:18px;\">\n              <div style=\"width:46px;height:46px;border-radius:14px;background:#CDE7DE;display:flex;align-items:center;justify-content:center;flex-shrink:0;\">\n                <svg width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\"><rect x=\"4\" y=\"10\" width=\"16\" height=\"11\" rx=\"3\" stroke=\"#3f7d6e\" stroke-width=\"1.7\"><\u002Frect><path d=\"M8 10V7a4 4 0 0 1 8 0v3\" stroke=\"#3f7d6e\" stroke-width=\"1.7\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg>\n              <\u002Fdiv>\n              <div><h3 style=\"margin:0 0 4px;font-size:16px;font-weight:800;\">Không cần đăng nhập<\u002Fh3><p style=\"margin:0;font-size:14px;line-height:1.55;color:#6B7975;font-weight:500;\">Không thu thập tên, email hay số điện thoại. ont-size:14px;line-height:1.55;color:#6B7975;font-weight:500;\">Phiên đã chọn sẽ bị xoá khỏi thiết bị và không thể khôi phục.<\u002Fp>\n            <div style=\"display:flex;flex-direction:column;gap:9px;\">\n              <button onclick=\"{{ onCancelSessionDelete }}\" style=\"width:100%;border:none;border-radius:16px;background:#5B9B8B;color:#fff;padding:15px;font-size:15.5px;font-weight:800;font-family:inherit;cursor:pointer;\">Giữ lại<\u002Fbutton>\n              <button onclick=\"{{ onConfirmSessionDelete }}\" style=\"width:100%;border:none;border-radius:16px;background:transparent;color:#B5524A;padding:12px;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;\">Xoá phiên<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- ============ CRISIS SHEET ============ -->\n        <sc-if value=\"{{ showCrisis }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"position:absolute;inset:0;background:rgba(28,44,40,.4);display:flex;align-items:flex-end;z-index:50;\">\n          <div style=\"width:100%;background:#fff;border-radius:28px 28px 43px 43px;padding:24px 26px 30px;\">\n            <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;\">\n              <div style=\"display:flex;align-items:center;gap:11px;\"><span style=\"width:42px;height:42px;border-radius:13px;background:#F3E2E0;display:flex;align-items:center;justify-content:center;\"><svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\"><path d=\"M12 20s-7-4.6-7-10a4 4 0 0 1 7-2.6A4 4 0 0 1 19 10c0 5.4-7 10-7 10Z\" stroke=\"#B5524A\" stroke-width=\"1.7\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg><\u002Fspan><h2 style=\"margin:0;font-size:19px;font-weight:800;color:#B5524A;\">Thông tin khẩn cấp<\u002Fh2><\u002Fdiv>\n              <button onclick=\"{{ onCloseCrisis }}\" style=\"width:36px;height:36px;border:none;border-radius:50%;background:#F2F7F5;color:#       <\u002Fdiv>\n              <div style=\"background:#FBFCFA;border:1px solid #EAF0ED;border-radius:18px;padding:15px 16px;display:flex;align-items:center;gap:13px;\">\n                <span style=\"width:44px;height:44px;border-radius:13px;background:#F2F7F5;display:flex;align-items:center;justify-content:center;flex-shrink:0;\"><svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" aria-hidden=\"true\"><path d=\"M5 6.5h14v9H12l-4 3v-3H5v-9Z\" stroke=\"#5B9B8B\" stroke-width=\"1.6\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n                <div style=\"flex:1;min-width:0;\"><div style=\"font-size:12.5px;font-weight:700;color:#9aa6a2;\">Đường dây tư vấn tâm lý<\u002Fdiv><div style=\"font-size:13.5px;font-weight:800;color:#6B7975;line-height:1.3;margin-top:1px;\">Số đã xác minh sẽ cập nhật cho địa bàn nghiên cứu<\u002Fdiv><\u002Fdiv>\n                <span aria-label=\"Đang chờ xác minh\" style=\"display:inline-flex;align-items:center;border-radius:14px;background:#EEF2F0;color:#9aa6a2;padding:11px 14px;font-size:12px;font-weight:800;min-height:46px;box-sizing:border-box;text-align:center;line-height:1.2;\">Chờ<br>xác minh<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <p style=\"margin:18px 2px 0;font-size:12.5px;line-height:1.5;color:#9aa6a2;font-weight:500;text-align:center;\">Bạn không phải đối mặt với điều này một mình.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- ============ SAVED CONFIRMATION (animated checkmark) ============ -->\n        <sc-if value=\"{{ savedAnim }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"position:absolute;inset:0;background:rgba(251,252,250,.96);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:60;animation:fadeIn .25s ease;\">\n          <div style=\"position:relative;width:104px;height:104px;display:flex;align-items:center;justify-content:center;\">\n            <span style=\"position:absolute;inset:0;border-radius:50%;background:#E4F1EC;animation:ringPop .5s cubic-bezier(.34,1.56,.64,1);\"><\u002Fspan>\n            <svg width=\"56\" height=\"56\" viewBox=\"0 0 24 24\" fill=\"none\" style=\"position:relative;\"><path d=\"M5 12.5l4.2 4.2L19 7\" stroke=\"#5B9B8B\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\" stroke-dasharray=\"36\" style=\"animation:drawCheck .55s cubic-bezier(.65,0,.35,1);\"><\u002Fpath><\u002Fsvg>\n          <\u002Fdiv>\n          <p style=\"margin:20px 0 0;font-size:16px;font-weight:800;color:#3f7d6e;\">Đã lưu trên thiết bị<\u002Fp>\n        <\u002Fdiv>\n        <\u002Fsc-if>\n\n       <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- HOME INDICATOR -->\n      <div style=\"height:26px;display:flex;align-items:center;justify-content:center;flex-shrink:0;z-index:5;\"><div style=\"width:132px;height:5px;border-radius:3px;background:rgba(46,58,56,.22);\"><\u002Fdiv><\u002Fdiv>\n\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:436,&quot;height&quot;:900},&quot;priorityVariant&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;Phương án A&quot;,&quot;options&quot;:[&quot;Phương án A&quot;,&quot;Phương án B&quot;],&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Biến thể&quot;},&quot;panicStyle&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;Khối đặc lớn&quot;,&quot;options&quot;:[&quot;Khối đặc lớn&quot;,&quot;Vòng hơi thở&quot;,&quot;Card mềm&quot;],&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Biến thể&quot;},&quot;scaleStyle&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;11 nút tròn&quot;,&quot;options&quot;:[&quot;11 nút tròn&quot;,&quot;Thanh trượt gradient&quot;,&quot;Lưới số&quot;],&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Biến thể&quot;},&quot;reduceMotion&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:false,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Giao diện&quot;}}\">\nclass Component extends DCLogic {\n  state = {\n    screen: 'welcome',\n    flow: null,\n    scorePhase: 'pre',\n    hrPhase: 'before',\n    hrChoice: null,\n    hrInput: '',\n    hrError: '',\n    groundStep: 1,\n    groundText: '',\n    trStep: 1,\n    anxietyPre: null,\n    anxietyPost: null,\n    hrBefore: null,\n    hrAfter: null,\n    helpfulness: null,\n    participantCode: '',\n    scrolledEnd: false,\n    tr: { situation:'', auto:'', evFor:'', evAgainst:'', balanced:'', emotion:[], intensity:5 },\n    trWheelZone: null,\n    // home emotion check-in (light mood log, separate from intervention sessions)\n    moodWheelZone: null,\n    moodSel: [],\n    moodIntensity: 5,\n    moodLog: [],\n    moodToast: false,\n    showMoodSave: false,\n    showEndConfirm: false,\n    prefSound: true,\n    prefHaptic: true,\n    prefReduceMotion: false,\n    // breathing\n    breathType: 'box',\n    breathDuration: 3,\n    breathRunning: false,\n    breathPhaseIdx: 0,\n    breathCount: 0,\n    breathCycle: 1,\n    totalCycles: 1,\n    breathScale: 0.5,\n    resultNote: '',\n    breathSound: false,\n    breathVisualOnly: false,\n    breathPhaseKey: 0,\n    // learn\n    learnId: null,\n    // progress\n    filterType: 'all',\n    showSave: false,\n    showDelete: false,\n    showCrisis: false,\n    showSessionDelete: false,\n    sessionToDelete: null,\n    savedAnim: false,\n    consent: { local:true, hr:true, export:false },\n    detail: null,\n    exportedCount: 0,\n    sessions: [\n      { id:1, date:'26 Th6, 2026', type:'breathing', pre:7, post:3, hrBefore:96, hrAfter:80, help:4, content:null },\n      { id:2, date:'25 Th6, 2026', type:'grounding', pre:8, post:4, hrBefore:98, hrAfter:84, help:5, content:null },\n      { id:3, date:'24 Th6, 2026', type:'breathing', pre:6, post:4, hrBefore:null, hrAfter:null, help:3, content:null },\n      { id:4, date:'22 Th6, 2026', type:'thoughtrecord', pre:7, post:5, hrBefore:null, hrAfter:null, help:4,\n        content:{ situation:'Sắp phải thuyết trình trước cả lớp', auto:'Mình sẽ nói vấp và mọi người sẽ cười mình', emotion:['Lo lắng','Sợ hãi'], intensity:8, evFor:'Lần trước mình có hơi run khi nói', evAgainst:'Mình đã chuẩn bị kỹ và từng nói tốt nhiều lần trước đây', balanced:'Mình có thể hồi hộp một chút nhưng vẫn làm được, và mọi người thường không soi xét như mình tưởng' } },\n    ],\n  };\n\n  componentDidMount(){ this.checkDisclaimer(); }\n  componentDidUpdate(){ this.checkDisclaimer(); }\n  componentWillUnmount(){ clearTimeout(this._bt); }\n  checkDisclaimer(){\n    if(this.state.screen==='disclaimer' && !this.state.scrolledEnd){\n      const el = document.querySelector('.scrollbody');\n      if(el && el.scrollHeight <= el.clientHeight + 6){ this.setState({ scrolledEnd:true }); }\n    }\n  }\n\n  // ---- helpers ----\n  lerp(t) {\n    const a = [91,155,139], b = [201,164,91];\n    return a.map((x,i) => Math.round(x + (b[i]-x)*t));\n  }\n  rgb(c){ return 'rgb('+c[0]+','+c[1]+','+c[2]+')'; }\n  rgba(c,al){ return 'rgba('+c[0]+','+c[1]+','+c[2]+','+al+')'; }\n  go(screen, extra){ this.setState(Object.assign({ screen }, extra||{})); }\n  todayLabel(){ const d=new Date(); return d.getDate()+' Th'+(d.getMonth()+1)+', '+d.getFullYear(); }\n\n  resetFlowState(flow){\n    return {\n      flow, scorePhase:'pre', hrPhase:'before', hrChoice:null, hrInput:'', hrError:'',\n      groundStep:1, groundText:'', trStep:1, trWheelZone:null, resultNote:'',\n      anxietyPre:null, anxietyPost:null, hrBefore:null, hrAfter:null, helpfulness:null,\n      breathType:'box', breathDuration:3, breathRunning:false, breathPhaseIdx:0,\n      breathCount:0, breathCycle:1, totalCycles:1, breathScale:0.5,\n      tr:{ situation:'', auto:'', evFor:'', evAgainst:'', balanced:'', emotion:[], intensity:5 },\n    };\n  }\n  startFlow(flow){\n    this.setState(Object.assign(this.resetFlowState(flow), { screen:'score', scorePhase:'pre' }));\n  }\n  // quick entry from Coping screen — skip pre-score, jump straight into the exercise\n  quickStart(flow){\n    const base = this.resetFlowState(flow);\n    if(flow==='breathing'){\n      this.setState(Object.assign(base, { screen:'breathing-main', breathType:'box', breathDuration:1 }), ()=>this.startBreath());\n    } else if(flow==='grounding'){\n      this.setState(Object.assign(base, { screen:'grounding', groundStep:1 }));\n    } else {\n      this.setState(Object.assign(base, { screen:'thoughtrecord', trStep:1 }));\n    }\n  }\n\n  // ---- breathing engine ----\n  phasesFor(type){\n    if(type==='box') return [\n      { label:'Hít vào', sec:4, scale:1 },\n      { label:'Giữ', sec:4, scale:1 },\n      { label:'Thở ra', sec:4, scale:0.5 },\n      { label:'Giữ', sec:4, scale:0.5 },\n    ];\n    return [\n      { label:'Hít vào', sec:4, scale:1 },\n      { label:'Thở ra', sec:6, scale:0.5 },\n    ];\n  }\n  startBreath(){\n    const phases = this.phasesFor(this.state.breathType);\n    this._phases = phases;\n    const cycleSec = phases.reduce((a,p)=>a+p.sec,0);\n    const totalCycles = Math.max(1, Math.round(this.state.breathDuration*60/cycleSec));\n    if(this.state.breathSound){ this.ensureAudio(); if(this._ac && this._ac.state==='suspended') this._ac.resume(); }\n    this.setState({ breathRunning:true, breathPhaseIdx:0, breathCount:phases[0].sec, breathCycle:1, totalCycles, breathScale:phases[0].scale, breathPhaseKey:1 });\n    this.phaseFx(phases[0]);\n    this.scheduleBreath();\n  }\n  scheduleBreath(){\n    clearTimeout(this._bt);\n    this._bt = setTimeout(()=>this.breathTick(), 1000);\n  }\n  breathTick(){\n    if(!this.state.breathRunning) return;\n    const phases = this._phases || this.phasesFor(this.state.breathType);\n    let { breathCount, breathPhaseIdx, breathCycle, totalCycles } = this.state;\n    breathCount -= 1;\n    if(breathCount <= 0){\n      breathPhaseIdx += 1;\n      if(breathPhaseIdx >= phases.length){\n        breathPhaseIdx = 0;\n        breathCycle += 1;\n        if(breathCycle > totalCycles){ return this.finishBreath(); }\n      }\n      const ph = phases[breathPhaseIdx];\n      this.setState(st=>({ breathPhaseIdx, breathCycle, breathCount:ph.sec, breathScale:ph.scale, breathPhaseKey: st.breathPhaseKey+1 }));\n      this.phaseFx(ph);\n    } else {\n      this.setState({ breathCount });\n    }\n    this.scheduleBreath();\n  }\n  pauseBreath(){\n    if(this.state.breathRunning){ clearTimeout(this._bt); this.setState({ breathRunning:false }); this.setBreathGain(0, 0.4); }\n    else { this.setState({ breathRunning:true }, ()=>{ const ph=(this._phases||this.phasesFor(this.state.breathType))[this.state.breathPhaseIdx]; if(this.state.breathSound && !this.state.breathVisualOnly) this.setBreathGain(ph.scale>=1?0.05:0.014, 0.5); this.scheduleBreath(); }); }\n  }\n  finishBreath(){\n    clearTimeout(this._bt); this.stopAudio();\n    this.buzz(30);\n    this.setState({ breathRunning:false, screen:'score', scorePhase:'post' });\n  }\n  // \"End early\" must NOT save and must NOT advance to Post/Result — confirm first\n  endBreathEarly(){\n    clearTimeout(this._bt);\n    this.setState({ breathRunning:false, showEndConfirm:true });\n    this.setBreathGain(0, 0.4);\n  }\n  resumeFromEndConfirm(){\n    this.setState({ showEndConfirm:false, breathRunning:true }, ()=>{\n      const ph=(this._phases||this.phasesFor(this.state.breathType))[this.state.breathPhaseIdx];\n      if(this.state.breathSound && !this.state.breathVisualOnly) this.setBreathGain(ph.scale>=1?0.05:0.014, 0.5);\n      this.scheduleBreath();\n    });\n  }\n  abandonBreath(){\n    clearTimeout(this._bt); this.stopAudio();\n    // ABANDONED session: discard draft from RAM, do NOT save, return Home\n    this.setState(Object.assign(this.resetFlowState(null), { screen:'home', flow:null, showEndConfirm:false, breathRunning:false, showSave:false }));\n  }\n\n  // ---- learn content ----\n  learnData(){\n    return [\n      { id:'what', title:'Lo âu là gì và vì sao cơ thể phản ứng vậy?', read:'1 phút đọc', accent:'#C2925A', bg:'#F4EAD6', body:[\n        'Lo âu là một phản ứng tự nhiên của cơ thể trước điều mà ta cảm thấy là mối đe doạ. Đó không phải dấu hiệu bạn yếu đuối — đó là cách cơ thể cố gắng bảo vệ bạn.',\n        'Khi lo âu, hệ thần kinh kích hoạt phản ứng \"chiến đấu hoặc bỏ chạy\": tim đập nhanh hơn, hơi thở gấp, cơ căng lên. Những cảm giác này khó chịu nhưng không nguy hiểm và sẽ dịu đi.',\n        'Hiểu rằng đây là phản ứng cơ thể — chứ không phải điều gì đang thật sự xảy ra — giúp bạn bớt sợ chính cảm giác lo âu.',\n      ] },\n      { id:'breath', title:'Vì sao bài tập thở giúp ích?', read:'1 phút đọc', accent:'#4f87a0', bg:'#E1ECF1', action:'breathing', actionLabel:'Thử bài tập thở ngay', body:[\n        'Khi lo âu, ta thường thở nhanh và nông mà không nhận ra. Điều đó càng gửi tín hiệu \"báo động\" lên não.',\n        'Thở chậm và đều, đặc biệt khi thở ra dài hơn hít vào, kích hoạt nhánh thần kinh giúp cơ thể thư giãn. Nhịp tim chậm lại, cơ giãn ra.',\n        'Bạn không cần thở \"đúng\" hoàn hảo. Chỉ cần dõi theo một nhịp đều đặn trong vài phút là đủ để cảm thấy khác đi.',\n      ] },\n      { id:'ground', title:'Vì sao bài tập tiếp đất (Grounding) giúp ích?', read:'1 phút đọc', accent:'#3f7d6e', bg:'#E4F1EC', action:'grounding', actionLabel:'Thử bài tập tiếp đất', body:[\n        'Khi lo âu, tâm trí thường bị cuốn vào những điều \"sẽ xảy ra\" trong tương lai. Tiếp đất kéo sự chú ý của bạn trở lại hiện tại.',\n        'Bằng cách lần lượt để ý những gì bạn nhìn, nghe, chạm, ngửi và nếm, bạn cho não một việc cụ thể để bám vào thay vì dòng suy nghĩ lo lắng.',\n        'Đây là một cách nhẹ nhàng để \"neo\" mình lại, đặc biệt khi cảm giác lo âu dâng lên nhanh.',\n      ] },\n      { id:'auto', title:'Suy nghĩ tự động là gì?', read:'1 phút đọc', accent:'#7a6ca0', bg:'#EAE6F1', body:[\n        'Suy nghĩ tự động là những ý nghĩ chợt xuất hiện trong đầu rất nhanh, thường mang màu sắc tiêu cực, mà ta hiếm khi dừng lại để kiểm tra.',\n        'Ví dụ: \"Mình chắc chắn sẽ thất bại\" hay \"Mọi người đang đánh giá mình\". Chúng có cảm giác như sự thật, nhưng thường chỉ là một cách diễn giải.',\n        'Nhận ra suy nghĩ tự động là bước đầu để nhìn nó từ một khoảng cách, thay vì tin ngay mọi điều nó nói.',\n      ] },\n      { id:'tr', title:'Thought Record hoạt động thế nào?', read:'1 phút đọc', accent:'#7a6ca0', bg:'#EAE6F1', action:'thoughtrecord', actionLabel:'Viết Thought Record', body:[\n        'Thought Record là một công cụ của CBT giúp bạn ghi lại tình huống, suy nghĩ tự động và cảm xúc đi kèm.',\n        'Sau đó bạn cân nhắc bằng chứng ủng hộ và phản bác cho suy nghĩ đó, rồi tìm một cách nhìn cân bằng hơn — thực tế và nhẹ nhàng hơn.',\n        'Mục tiêu không phải là \"suy nghĩ tích cực giả tạo\", mà là nhìn tình huống công bằng hơn để cảm xúc bớt nặng nề.',\n      ] },\n    ];\n  }\n  typeMeta(type){\n    if(type==='grounding') return { label:'Bài tiếp đất', color:'#5B9B8B', bg:'#E4F1EC' };\n    if(type==='breathing') return { label:'Bài tập thở', color:'#4f87a0', bg:'#E1ECF1' };\n    return { label:'Thought Record', color:'#7a6ca0', bg:'#EAE6F1' };\n  }\n\n  setScore(n){\n    this.buzz(10);\n    if(this.state.scorePhase==='pre') this.setState({ anxietyPre:n });\n    else this.setState({ anxietyPost:n });\n  }\n\n  next(){\n    const s = this.state;\n    if(s.screen==='score'){\n      if(s.scorePhase==='pre'){\n        if(s.flow==='thoughtrecord') return this.setState({ screen:'thoughtrecord', trStep:1 });\n        return this.setState({ screen:'heartrate', hrPhase:'before', hrChoice:null, hrInput:'', hrError:'' });\n      } else {\n        if(s.flow==='thoughtrecord') return this.setState({ screen:'result' });\n        return this.setState({ screen:'heartrate', hrPhase:'after', hrChoice:null, hrInput:'', hrError:'' });\n      }\n    }\n    if(s.screen==='heartrate'){\n      if(s.hrPhase==='before'){\n        if(s.flow==='breathing') return this.setState({ screen:'breathing-choice' });\n        return this.setState({ screen:'grounding', groundStep:1, groundText:'' });\n      }\n      return this.setState({ screen:'result' });\n    }\n    if(s.screen==='breathing-choice'){\n      this.setState({ screen:'breathing-main' }, ()=>this.startBreath());\n      return;\n    }\n    if(s.screen==='grounding'){\n      if(s.groundStep<5) return this.setState({ groundStep:s.groundStep+1, groundText:'' });\n      return this.setState({ screen:'score', scorePhase:'post' });\n    }\n    if(s.screen==='thoughtrecord'){\n      if(s.trStep<6) return this.setState({ trStep:s.trStep+1 });\n      return this.setState({ screen:'score', scorePhase:'post' });\n    }\n    if(s.screen==='result') return this.setState({ screen:'helpfulness' });\n    if(s.screen==='helpfulness') return this.setState({ showSave:true });\n  }\n\n  back(){\n    const s = this.state;\n    if(s.screen==='grounding'){\n      if(s.groundStep>1) return this.setState({ groundStep:s.groundStep-1, groundText:'' });\n      return this.setState({ screen:'heartrate', hrPhase:'before', hrChoice:null });\n    }\n    if(s.screen==='thoughtrecord'){\n      if(s.trStep>1) return this.setState({ trStep:s.trStep-1 });\n      return this.setState({ screen:'score', scorePhase:'pre' });\n    }\n    if(s.screen==='breathing-choice'){\n      return this.setState({ screen:'heartrate', hrPhase:'before', hrChoice:null });\n    }\n    if(s.screen==='heartrate'){\n      if(s.hrPhase==='before') return this.setState({ screen:'score', scorePhase:'pre' });\n      if(s.flow==='grounding') return this.setState({ screen:'grounding', groundStep:5 });\n      if(s.flow==='breathing') return this.setState({ screen:'breathing-choice' });\n      return this.setState({ screen:'thoughtrecord', trStep:6 });\n    }\n    if(s.screen==='score'){\n      if(s.scorePhase==='post'){\n        if(s.flow==='grounding') return this.setState({ screen:'grounding', groundStep:5 });\n        if(s.flow==='breathing') return this.setState({ screen:'breathing-choice' });\n        return this.setState({ screen:'thoughtrecord', trStep:6 });\n      }\n      return this.cancelFlow();\n    }\n  }\n\n  cancelFlow(){ clearTimeout(this._bt); this.stopAudio(); this.setState({ screen:'home', flow:null, showSave:false, breathRunning:false }); }\n\n  submitHr(){\n    const s = this.state;\n    const v = parseInt(s.hrInput, 10);\n    if(isNaN(v) || v<30 || v>220){ return this.setState({ hrError:'Vui lòng nhập giá trị từ 30 đến 220 bpm' }); }\n    if(s.hrPhase==='before') this.setState({ hrBefore:v, hrError:'' });\n    else this.setState({ hrAfter:v, hrError:'' });\n    this.next();\n  }\n\n  saveSession(persist){\n    if(persist){\n      const s = this.state;\n      const sess = { id:Date.now(), date:this.todayLabel(), type:s.flow, pre:s.anxietyPre, post:s.anxietyPost, hrBefore:s.hrBefore, hrAfter:s.hrAfter, help:s.helpfulness, content: s.flow==='thoughtrecord' ? Object.assign({}, s.tr) : null };\n      this.buzz(28);\n      this.setState(st => ({ sessions:[sess, ...st.sessions], showSave:false, savedAnim:true }));\n      clearTimeout(this._saved); this._saved = setTimeout(()=>this.setState({ savedAnim:false, screen:'home', flow:null }), 1150);\n    } else {\n      this.setState({ showSave:false, screen:'home', flow:null });\n    }\n  }\n\n  toggleEmotion(name){\n    this.setState(st => {\n      const has = st.tr.emotion.indexOf(name) !== -1;\n      const emotion = has ? st.tr.emotion.filter(x=>x!==name) : st.tr.emotion.concat([name]);\n      return { tr: Object.assign({}, st.tr, { emotion }) };\n    });\n  }\n  setTrField(field, val){ this.setState(st => ({ tr: Object.assign({}, st.tr, { [field]:val }) })); }\n\n  // ---- emotion wheel (Mood-Meter style, 4 quadrants) ----\n  emotionZones(){\n    return [\n      { id:0, title:'Dễ chịu · năng lượng cao', mood:'Tươi sáng', color:'#D29A33', soft:'#F7EBCC', words:['Hào hứng','Vui','Tự tin','Tràn năng lượng','Phấn khởi','Lạc quan','Tự hào'] },\n      { id:1, title:'Dễ chịu · năng lượng thấp', mood:'Dịu êm', color:'#4E9A88', soft:'#D8EBE3', words:['Bình yên','Thư thái','Biết ơn','An toàn','Hài lòng','Thoải mái','Được yêu thương'] },\n      { id:2, title:'Khó chịu · năng lượng cao', mood:'Căng', color:'#C97E50', soft:'#F2DCCB', words:['Lo âu','Căng thẳng','Bồn chồn','Tức giận','Hoảng','Sợ hãi','Bực bội'] },\n      { id:3, title:'Khó chịu · năng lượng thấp', mood:'Trầm', color:'#6C859B', soft:'#DAE2E9', words:['Buồn','Mệt mỏi','Trống rỗng','Cô đơn','Chán nản','Thất vọng','Tủi thân'] },\n    ];\n  }\n  buildWheel(activeZoneId, selected, onPick, onToggle){\n    const zones = this.emotionZones();\n    const sel = selected || [];\n    const grid = [2,0,3,1].map(oi=>zones[oi]).map(z => {\n      const count = sel.filter(w => z.words.indexOf(w)!==-1).length;\n      return {\n        id:z.id, title:z.title, mood:z.mood, color:z.color,\n        sample:z.words.slice(0,3).join('  ·  '),\n        hasCount: count>0, count,\n        cardStyle:'position:relative;border:1.6px solid '+z.color+'40;border-radius:22px;background:linear-gradient(155deg,'+z.soft+','+z.soft+'80);padding:15px 15px 14px;text-align:left;cursor:pointer;font-family:inherit;display:flex;flex-direction:column;gap:9px;min-height:118px;justify-content:space-between;',\n        dotStyle:'width:30px;height:30px;border-radius:10px;background:'+z.color+';opacity:.95;box-shadow:0 4px 10px '+z.color+'4d;',\n        countStyle:'position:absolute;top:11px;right:11px;min-width:22px;height:22px;border-radius:11px;background:'+z.color+';color:#fff;font-size:12px;font-weight:800;display:flex;align-items:center;justify-content:center;padding:0 6px;',\n        onPick:()=>{ this.buzz(10); onPick(z.id); },\n      };\n    });\n    const zone = zones.find(z=>z.id===activeZoneId) || null;\n    const words = zone ? zone.words.map((name,i)=>{\n      const on = sel.indexOf(name)!==-1;\n      const style = on\n        ? 'border:none;border-radius:16px;background:'+zone.color+';color:#fff;padding:13px 19px;font-size:15px;font-weight:800;font-family:inherit;cursor:pointer;box-shadow:0 9px 20px '+zone.color+'4d;transform:scale(1.04);animation:wordPop .3s cubic-bezier(.22,.61,.36,1);animation-delay:'+(i*0.035)+'s;'\n        : 'border:1.6px solid '+zone.color+'5c;border-radius:16px;background:#fff;color:#41514c;padding:13px 19px;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;animation:wordPop .3s cubic-bezier(.22,.61,.36,1);animation-delay:'+(i*0.035)+'s;';\n      return { name, style, onToggle:()=>{ this.buzz(on?6:12); onToggle(name); } };\n    }) : [];\n    return { grid, words, zone };\n  }\n  // flat variant builder: all standardized labels grouped by zone, no drill-in\n  buildFlat(selected, onPickWord){\n    const sel = selected || [];\n    return this.emotionZones().map(z => ({\n      mood:z.mood, sub:z.title, color:z.color,\n      headStyle:'display:flex;align-items:center;gap:8px;margin:0 0 10px;',\n      dotStyle:'width:14px;height:14px;border-radius:5px;background:'+z.color+';flex-shrink:0;',\n      labelStyle:'font-size:13.5px;font-weight:800;color:'+z.color+';letter-spacing:-.1px;',\n      words: z.words.map(name => {\n        const on = sel.indexOf(name)!==-1;\n        const style = on\n          ? 'border:none;border-radius:14px;background:'+z.color+';color:#fff;padding:11px 16px;font-size:14.5px;font-weight:800;font-family:inherit;cursor:pointer;box-shadow:0 7px 16px '+z.color+'4d;min-height:46px;'\n          : 'border:1.6px solid '+z.color+'59;border-radius:14px;background:#fff;color:#41514c;padding:11px 16px;font-size:14.5px;font-weight:700;font-family:inherit;cursor:pointer;min-height:46px;';\n        return { name, style, onToggle:()=>{ this.buzz(on?6:12); onPickWord(z.id, name); } };\n      }),\n    }));\n  }\n  toggleMood(name){\n    this.setState(st => {\n      const has = st.moodSel.indexOf(name)!==-1;\n      const moodSel = has ? st.moodSel.filter(x=>x!==name) : st.moodSel.concat([name]);\n      return { moodSel };\n    });\n  }\n  openMoodCheck(){ this.setState({ screen:'moodcheck', moodWheelZone:null, moodSel:[], moodIntensity:5 }); }\n  // Mood check-in must explicitly ask Save / Don't-save — never persist silently\n  confirmMood(){\n    if(!this.state.moodSel.length){ return this.setState({ screen:'home', moodWheelZone:null }); }\n    this.buzz(10);\n    this.setState({ showMoodSave:true });\n  }\n  saveMood(persist){\n    const s = this.state;\n    if(persist){\n      const zone = this.emotionZones().find(z=>z.id===s.moodWheelZone);\n      const entry = { id:Date.now(), date:this.todayLabel(), zone:zone?zone.id:null, mood:zone?zone.mood:'', words:s.moodSel.slice(), intensity:s.moodIntensity };\n      this.buzz(22);\n      // saving requires local-storage consent — enable it as part of the explicit Save action\n      this.setState({ consent:Object.assign({},s.consent,{local:true}), moodLog:[entry, ...s.moodLog], moodSel:[], moodIntensity:5, moodWheelZone:null, screen:'home', showMoodSave:false, moodToast:true });\n      clearTimeout(this._toast); this._toast = setTimeout(()=>this.setState({ moodToast:false }), 2800);\n    } else {\n      // discard — no trace kept (local-only, never exported)\n      this.setState({ moodSel:[], moodIntensity:5, moodWheelZone:null, screen:'home', showMoodSave:false });\n    }\n  }\n\n  // ---- haptic + breathing audio ----\n  buzz(ms){ if(!this.state.prefHaptic) return; try{ if(navigator.vibrate) navigator.vibrate(ms); }catch(e){} }\n  ensureAudio(){\n    if(this._ac) return;\n    try{\n      const AC = window.AudioContext || window.webkitAudioContext;\n      this._ac = new AC();\n      this._gain = this._ac.createGain(); this._gain.gain.value = 0;\n      const lp = this._ac.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=520;\n      this._osc = this._ac.createOscillator(); this._osc.type='sine'; this._osc.frequency.value=110;\n      this._osc2 = this._ac.createOscillator(); this._osc2.type='sine'; this._osc2.frequency.value=146.83;\n      this._osc.connect(this._gain); this._osc2.connect(this._gain);\n      this._gain.connect(lp); lp.connect(this._ac.destination);\n      this._osc.start(); this._osc2.start();\n    }catch(e){ this._ac = null; }\n  }\n  setBreathGain(target, sec){\n    if(!this._ac || !this._gain) return;\n    try{\n      const now = this._ac.currentTime;\n      this._gain.gain.cancelScheduledValues(now);\n      this._gain.gain.setValueAtTime(this._gain.gain.value, now);\n      this._gain.gain.linearRampToValueAtTime(target, now + Math.max(0.06, sec*0.85));\n    }catch(e){}\n  }\n  stopAudio(){ this.setBreathGain(0, 0.3); }\n  phaseFx(ph){\n    if(this.state.breathVisualOnly) return;\n    this.buzz(ph.scale>=1 ? 22 : 13);\n    if(this.state.breathSound) this.setBreathGain(ph.scale>=1 ? 0.05 : 0.014, ph.sec);\n  }\n  toggleBreathSound(){\n    if(!this.state.prefSound && !this.state.breathSound) return;\n    const on = !this.state.breathSound;\n    this.setState({ breathSound:on, breathVisualOnly: on ? false : this.state.breathVisualOnly });\n    if(on){ this.ensureAudio(); if(this._ac && this._ac.state==='suspended') this._ac.resume();\n      if(this.state.breathRunning){ const ph=(this._phases||this.phasesFor(this.state.breathType))[this.state.breathPhaseIdx]; this.setBreathGain(ph.scale>=1?0.05:0.014, 0.6); } }\n    else { this.setBreathGain(0, 0.3); }\n  }\n  toggleVisualOnly(){\n    const on = !this.state.breathVisualOnly;\n    this.setState({ breathVisualOnly:on, breathSound: on ? false : this.state.breathSound });\n    if(on) this.setBreathGain(0, 0.3);\n  }\n\n  // ---- companion plant (very gentle, grows with practice; never guilt-trips) ----\n  companionVals(count){\n    const lvl = count;\n    const scale = Math.min(1.06, 0.82 + lvl*0.022);\n    const lf = (need)=> lvl>=need ? 1 : 0.16;\n    let caption;\n    if(lvl===0) caption='Mỗi lần thực hành, mầm cây nhỏ của bạn sẽ lớn thêm một chút.';\n    else if(lvl<3) caption='Mầm cây của bạn đang nhú lên.';\n    else if(lvl<6) caption='Cây của bạn đang lớn dần.';\n    else if(lvl<10) caption='Cây của bạn xanh tốt.';\n    else caption='Khu vườn của bạn đã nở hoa.';\n    return {\n      wrapStyle:'transform:scale('+scale+');transform-origin:bottom center;transition:transform .7s cubic-bezier(.22,.61,.36,1);',\n      caption, l1:lf(1), l2:lf(2), l3:lf(4), l4:lf(6), bloom: lvl>=10?1:0,\n    };\n  }\n\n  renderVals(){\n    const s = this.state;\n    const p = this.props || {};\n    const screen = s.screen;\n\n    // tweaks\n    const panic = p.panicStyle || 'Khối đặc lớn';\n    const scale = p.scaleStyle || '11 nút tròn';\n    const motionOn = !(p.reduceMotion) && !s.prefReduceMotion;\n    const priorityVariant = p.priorityVariant || 'Phương án A';\n    const isB = priorityVariant === 'Phương án B';\n\n    // greeting\n    const h = new Date().getHours();\n    let greeting = 'Chào buổi tối';\n    if(h < 11) greeting = 'Chào buổi sáng';\n    else if(h < 18) greeting = 'Chào buổi chiều';\n\n    // ---- anxiety scale items ----\n    const cur = s.scorePhase==='pre' ? s.anxietyPre : s.anxietyPost;\n    const scaleItems = [];\n    for(let n=0;n<=10;n++){\n      const c = this.lerp(n/10);\n      const sel = cur === n;\n      const base = 'cursor:pointer;font-family:inherit;font-weight:800;transition:all .15s;';\n      const roundStyle = sel\n        ? base+'width:52px;height:52px;border-radius:50%;border:none;background:'+this.rgb(c)+';color:#fff;font-size:20px;box-shadow:0 7px 16px '+this.rgba(c,.4)+';transform:scale(1.08);'\n        : base+'width:52px;height:52px;border-radius:50%;border:1.6px solid '+this.rgba(c,.45)+';background:'+this.rgba(c,.09)+';color:'+this.rgb(c)+';font-size:19px;';\n      const gridStyle = sel\n        ? base+'width:100%;aspect-ratio:1;border-radius:16px;border:none;background:'+this.rgb(c)+';color:#fff;font-size:20px;box-shadow:0 7px 16px '+this.rgba(c,.4)+';'\n        : base+'width:100%;aspect-ratio:1;border-radius:16px;border:1.6px solid '+this.rgba(c,.45)+';background:'+this.rgba(c,.09)+';color:'+this.rgb(c)+';font-size:19px;';\n      scaleItems.push({ n, roundStyle, gridStyle, onSelect:()=>this.setScore(n) });\n    }\n    const sliderValue = cur==null ? 5 : cur;\n    const scoreValueDisplay = cur==null ? '–' : String(cur);\n    const scoreValueColor = cur==null ? '#C2CCC8' : this.rgb(this.lerp(cur/10));\n\n    // ---- grounding ----\n    const gData = [\n      { num:5, sense:'NHÌN THẤY', instr:'Nhìn quanh và tìm 5 thứ bạn có thể nhìn thấy.', ph:'Có thể gõ hoặc chỉ thầm nghĩ trong đầu…' },\n      { num:4, sense:'CHẠM ĐƯỢC', instr:'Chú ý 4 thứ bạn đang cảm nhận bằng xúc giác.', ph:'Có thể gõ hoặc chỉ thầm nghĩ trong đầu…' },\n      { num:3, sense:'NGHE THẤY', instr:'Lắng nghe 3 âm thanh quanh bạn.', ph:'Có thể gõ hoặc chỉ thầm nghĩ trong đầu…' },\n      { num:2, sense:'NGỬI THẤY', instr:'Nhận ra 2 mùi hương quanh bạn.', ph:'Có thể gõ hoặc chỉ thầm nghĩ trong đầu…' },\n      { num:1, sense:'NẾM ĐƯỢC', instr:'Cảm nhận 1 vị bạn đang có.', ph:'Có thể gõ hoặc chỉ thầm nghĩ trong đầu…' },\n    ];\n    const g = gData[s.groundStep-1] || gData[0];\n    const gDots = [1,2,3,4,5].map(i => {\n      const st = i < s.groundStep ? 'done' : (i===s.groundStep ? 'cur' : 'todo');\n      const style = st==='cur'\n        ? 'min-width:26px;height:26px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:900;background:#5B9B8B;color:#fff;'\n        : st==='done'\n        ? 'width:26px;height:26px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;background:#CDE7DE;color:#3f7d6e;'\n        : 'width:26px;height:26px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;background:#EBF1EE;color:#B6C4BF;';\n      return { label:[5,4,3,2,1][i-1], style };\n    });\n\n    // ---- thought record ----\n    const trData = [\n      { field:'si reDeltaText = resultScoreShow ? (sDelta<=0 ? '−'+Math.abs(sDelta) : '+'+sDelta) : '';\n    const deltaChip = (down) => 'display:inline-block;font-size:13px;font-weight:800;padding:5px 10px;border-radius:11px;background:'+(down?'#E4F1EC':'#F7EFDD')+';color:'+(down?'#3f7d6e':'#a07f3a')+';';\n    const resultHrShow = s.hrBefore!=null && s.hrAfter!=null;\n    const hDelta = resultHrShow ? (s.hrAfter - s.hrBefore) : 0;\n    const hrDown = hDelta <= 0;\n    const hrDeltaText = resultHrShow ? (hDelta<=0 ? '−'+Math.abs(hDelta) : '+'+hDelta) : '';\n    // warm acknowledgment that adapts to how the session went\n    let resultTitle, resultMsg;\n    if(resultScoreShow && sDelta <= -2){ resultTitle='Bạn đã dịu lại rồi'; resultMsg='Mức lo âu của bạn đã giảm xuống. Thật đáng quý — hãy ghi nhận điều đó cho mình.'; }\n    else if(resultScoreShow && sDelta < 0){ resultTitle='Nhẹ nhõm hơn một chút'; resultMsg='Bạn đã dịu lại đôi phần. Mỗi bước nhỏ đều có ý nghĩa.'; }\n    else if(resultScoreShow && sDelta > 0){ resultTitle='Cảm ơn bạn đã thử'; resultMsg='Đôi khi chỉ cần dừng lại một nhịp cũng đã đủ. Bạn đã chăm sóc cho mình hôm nay.'; }\n    else { resultTitle='Bạn đã hoàn thành'; resultMsg='Cảm ơn bạn đã dành một khoảng lặng cho chính mình.'; }\n\n    // ---- progress + history ----\n    const sessions = s.sessions;\n    const ft = s.filterType;\n    const filtered = ft==='all' ? sessions : sessions.filter(x=>x.type===ft);\n    const sessionsView = filtered.map(se => {\n      const m = this.typeMeta(se.type);\n      return {\n        date: se.date,\n        typeLabel: m.label,\n        scoreText: (se.pre!=null && se.post!=null) ? (se.pre+'→'+se.post) : '—',\n        iconWrap: 'width:42px;height:42px;border-radius:13px;flex-shrink:0;display:flex;align-items:center;justify-content:center;background:'+m.bg+';',\n        iconDot: 'width:18px;height:18px;border-radius:6px;background:'+m.color+';',\n        onOpen: ()=>this.setState({ screen:'history-detail', detail:se }),\n        onDelete: (e)=>{ e.stopPropagation(); this.setState({ showSessionDelete:true, sessionToDelete:se.id }); },\n      };\n    });\n    const historyEmpty = sessions.length===0;\n\n    // summary\n    const withBoth = sessions.filter(x=>x.pre!=null && x.post!=null);\n    const sumSessions = sessions.length;\n    const drops = withBoth.map(x=>x.pre-x.post);\n    const avgDrop = drops.length ? drops.reduce((a,b)=>a+b,0)/drops.length : 0;\n    const sumDrop = drops.length ? ('−'+(Math.round(avgDrop*10)/10)) : '—';\n    const counts = {}; sessions.forEach(x=>{ counts[x.type]=(counts[x.type]||0)+1; });\n    let mu=null, mc=-1; Object.keys(counts).forEach(k=>{ if(counts[k]>mc){ mc=counts[k]; mu=k; } });\n    const sumMostUsed = mu ? this.typeMeta(mu).label : '—';\n\n    // trend chart (filtered, oldest → newest)\n    const chartSrc = (ft==='all' ? withBoth : withBoth.filter(x=>x.type===ft)).slice().reverse();\n    const chartShow = chartSrc.length>=2;\n    const chartHint = !chartShow;\n    const yFor = v => Math.round((110 - (v/10)*90)*10)/10;\n    const cn = chartSrc.length;\n    const xFor = i => Math.round((14 + (cn<=1?0:i*272/(cn-1)))*10)/10;\n    const prePts = chartSrc.map((d,i)=>({ cx:xFor(i), cy:yFor(d.pre) }));\n    const postPts = chartSrc.map((d,i)=>({ cx:xFor(i), cy:yFor(d.post) }));\n    const prePoly = prePts.map(p=>p.cx+','+p.cy).join(' ');\n    const postPoly = postPts.map(p=>p.cx+','+p.cy).join(' ');\n    // delta-bar variant (Progress B)\n    const barMax = 10;\n    const barItems = chartSrc.map(d => {\n      const drop = d.pre - d.post;\n      return {\n        date: d.date,\n        preStyle:'width:14px;border-radius:7px 7px 3px 3px;background:#E2C892;height:'+Math.max(7,Math.round(d.pre/barMax*92))+'px;',\n        postStyle:'width:14px;border-radius:7px 7px 3px 3px;background:#5B9B8B;height:'+Math.max(7,Math.round(d.post/barMax*92))+'px;',\n        dropText: drop>0 ? '−'+drop : (drop<0 ? '+'+Math.abs(drop) : '0'),\n        dropStyle:'font-size:11px;font-weight:800;color:'+(drop>0?'#3f7d6e':'#a07f3a')+';',\n      };\n    });\n\n    // filter chips\n    const filterDefs = [['all','Tất cả'],['breathing','Thở'],['grounding','Tiếp đất'],['thoughtrecord','Thought Record']];\n    const filterItems = filterDefs.map(d => {\n      const sel = ft===d[0];\n      const style = sel\n        ? 'border:none;border-radius:20px;background:#5B9B8B;color:#fff;padding:9px 15px;font-size:12.5px;font-weight:700;font-family:inherit;cursor:pointer;'\n        : 'border:1.4px solid #E0E8E5;border-radius:20px;background:#fff;color:#6B7975;padding:9px 15px;font-size:12.5px;font-weight:700;font-family:inherit;cursor:pointer;';\n      return { label:d[1], style, onSelect:()=>this.setState({ filterType:d[0] }) };\n    });\n\n    // progress line on home\n    const showProgressLine = sessions.length>0;\n    const progressLineText = 'Tuần này bạn đã thực hành '+sessions.length+' lần. Mỗi lần đều đáng quý.';\n\n    // ---- breathing render ----\n    const breathPhases = this.phasesFor(s.breathType);\n    const curPhase = breathPhases[s.breathPhaseIdx] || breathPhases[0];\n    const transMs = (curPhase.sec||4)*1000;\n    const isInhale = curPhase.label==='Hít vào';\n    const ease = isInhale ? 'cubic-bezier(.33,.18,.48,1)' : 'cubic-bezier(.45,.05,.55,.95)';\n    const sc = s.breathScale;\n    const breathCircleStyle = 'transform:scale('+sc+');transition:transform '+transMs+'ms '+ease+';';\n    const breathCircleStyle2 = 'transform:scale('+(0.9*sc+0.02)+');transition:transform '+transMs+'ms '+ease+';';\n    const breathCircleStyle3 = 'transform:scale('+(0.78*sc+0.06)+');transition:transform '+transMs+'ms '+ease+';';\n    const breathGlowStyle = 'transform:scale('+(0.85+sc*0.55)+');opacity:'+(0.28+sc*0.5)+';transition:transform '+transMs+'ms '+ease+',opacity '+transMs+'ms '+ease+';';\n    const breathOrbStyle = 'transform:scale('+sc+');transition:transform '+transMs+'ms '+ease+';';\n    const breathHaloStyle = 'transform:scale('+(sc*1.06)+');transition:transf
